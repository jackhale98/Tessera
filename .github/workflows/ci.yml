name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Build CLI, core, and shared commands (desktop/mobile Tauri apps require platform deps)
      - name: Build
        run: cargo build --verbose --package tessera-design-toolkit --package tessera-design-toolkit-core --package tdt-tauri-commands

      - name: Run tests
        run: cargo test --verbose --package tessera-design-toolkit --package tessera-design-toolkit-core --package tdt-tauri-commands

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --package tessera-design-toolkit --package tessera-design-toolkit-core --package tdt-tauri-commands

  # Verify frontend builds
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build frontend
        working-directory: apps/${{ matrix.app }}
        run: npm run build

  # Verify Rust compiles on all platforms
  build-check:
    name: Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Check CLI, core, and shared commands (desktop/mobile apps require platform-specific deps)
      - run: cargo check --package tessera-design-toolkit --package tessera-design-toolkit-core --package tdt-tauri-commands
