name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Build only CLI and core packages (desktop app requires GTK which is handled in release workflow)
      - name: Build
        run: cargo build --verbose --package tdt --package tdt-core

      - name: Run tests
        run: cargo test --verbose --package tdt --package tdt-core

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --package tdt --package tdt-core

  # Verify it compiles on all platforms
  build-check:
    name: Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Check only CLI and core packages (desktop app requires platform-specific deps)
      - run: cargo check --package tdt --package tdt-core
