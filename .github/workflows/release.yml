name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build CLI for all platforms
  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (glibc)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tdt
            archive: tdt-linux-x64.tar.gz

          # Linux x64 (musl/Alpine)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tdt
            archive: tdt-linux-musl-x64.tar.gz
            musl: true

          # Linux i686 (musl/iSH on iOS)
          # iSH supports SSE but not SSE2, use pentium baseline + SSE
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            artifact: tdt
            archive: tdt-linux-musl-i686.tar.gz
            cross: true
            rustflags: "-C target-cpu=pentium -C target-feature=+sse"

          # Linux ARM64 (glibc)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tdt
            archive: tdt-linux-arm64.tar.gz
            cross: true

          # Linux ARM64 (musl/Termux/Android)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tdt
            archive: tdt-linux-musl-arm64.tar.gz
            cross: true

          # macOS x64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tdt
            archive: tdt-macos-x64.tar.gz

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tdt
            archive: tdt-macos-arm64.tar.gz

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tdt.exe
            archive: tdt-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross && !matrix.rustflags
        run: cross build --release --target ${{ matrix.target }} --package tessera-design-toolkit

      - name: Build (cross with rustflags)
        if: matrix.cross && matrix.rustflags
        run: RUSTFLAGS="${{ matrix.rustflags }}" cross build --release --target ${{ matrix.target }} --package tessera-design-toolkit

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --package tessera-design-toolkit

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact }} || true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.archive }} ${{ matrix.artifact }}
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.artifact }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # Build Desktop app for all platforms
  build-desktop:
    name: Build Desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

          # macOS Intel
          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg

          # Linux x64
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

          # Windows x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: List bundle directory (debug)
        run: |
          echo "=== Listing bundle directories ==="
          find target -type d -name "bundle" 2>/dev/null || true
          echo "=== Listing all bundle files ==="
          find target -path "*/bundle/*" -type f 2>/dev/null || true
        shell: bash

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tessera-desktop-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tessera-desktop-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tessera-desktop-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  # Build Mobile app for Android
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Initialize Tauri Android project
        working-directory: apps/mobile
        run: npx tauri android init

      - name: Build Android APK
        working-directory: apps/mobile
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk true

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: tessera-mobile-android
          path: |
            apps/mobile/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  # Build Mobile app for iOS
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Initialize Tauri iOS project
        working-directory: apps/mobile
        run: npx tauri ios init

      # For signed builds, set up code signing:
      # - Import Apple Developer certificate from secrets
      # - Install provisioning profile
      # See: https://docs.github.com/en/actions/deployment/deploying-xcode-applications/installing-an-apple-certificate-on-macos-runners
      #
      # Required secrets for signed builds:
      #   APPLE_CERTIFICATE        - Base64-encoded .p12 certificate
      #   APPLE_CERTIFICATE_PASSWORD - Certificate password
      #   APPLE_PROVISIONING_PROFILE - Base64-encoded .mobileprovision
      #   APPLE_TEAM_ID            - Apple Developer Team ID

      - name: Build iOS (unsigned)
        working-directory: apps/mobile
        run: npx tauri ios build -- --allow-provisioning-updates
        continue-on-error: true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tessera-mobile-ios
          path: |
            apps/mobile/src-tauri/gen/apple/build/**/*.ipa
            apps/mobile/src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    needs: [build-cli, build-desktop, build-android, build-ios]
    if: always() && needs.build-cli.result == 'success' && needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts (debug)
        run: |
          echo "=== All downloaded artifacts ==="
          find artifacts -type f | head -100
          echo "=== Directory structure ==="
          ls -laR artifacts/ | head -100

      - name: Prepare release files
        run: |
          mkdir -p release
          cd artifacts
          # Flatten artifact directories - use -print0/xargs to handle spaces in filenames
          find . -mindepth 2 -type f \( \
            -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" -o \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o \
            -name "*.exe" -o -name "*.apk" -o -name "*.ipa" \
          \) -print0 | xargs -0 -I{} cp "{}" ../release/
          cd ../release
          # List what we have
          echo "Release files:"
          ls -la
          # Create checksums
          sha256sum * > checksums.txt 2>/dev/null || echo "No files to checksum"
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
